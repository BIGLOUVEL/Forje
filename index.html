<!-- Auth CSS — toujours actif -->
<link rel="stylesheet" href="app-auth.css"/>

<!-- Landing CSS — désactivé jusqu'à navigation explicite -->
<link id="css-l1" rel="stylesheet" href="forje.css" media="none"/>
<link id="css-l2" rel="stylesheet" href="forje-lux.css" media="none"/>
<link id="css-l3" rel="stylesheet" href="forje-mark.css" media="none"/>

<!-- App CSS — désactivé par défaut -->
<link id="css-a1" rel="stylesheet" href="app.css?v=7" media="none"/>
<link id="css-a2" rel="stylesheet" href="app-dashboard.css?v=7" media="none"/>
<link id="css-a3" rel="stylesheet" href="app-screens.css?v=7" media="none"/>
<link id="css-a4" rel="stylesheet" href="app-sources.css?v=7" media="none"/>
<link id="css-a5" rel="stylesheet" href="app-onboarding.css?v=7" media="none"/>

<style>
  body { margin:0; background:#000004; }
  body.app-mode { background:#FAFAF8; }
  #root { transition: opacity 0.22s ease; }
  #root.fading { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // Activation CSS immédiate basée sur la session Supabase en localStorage
  // → évite tout flash au chargement
  (function() {
    try {
      var raw = localStorage.getItem('sb-tmsbtjczvjdwzfkoprwq-auth-token');
      if (raw && JSON.parse(raw).access_token) {
        ['css-a1','css-a2','css-a3','css-a4','css-a5','css-a6'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) el.media = '';
        });
        document.body.classList.add('app-mode');
      }
    } catch(e) {}
  })();

  window.__forjeUnified = true;
  window.TWEAKS = {
    heroObject: 'Normal',
    hueShift: 0,
    starfieldDensity: 1.0,
    headline: 'Forge ta marque.',
    headlineAccent: 'Publie à l\'infini.'
  };
</script>

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  try {
    window.__supabase = supabase.createClient(

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
        crossorigin="anonymous"></script>

<script>
(async () => {
  const files = [
    'forje-atoms.jsx',
    'forje-hero.jsx',
    'forje-sections.jsx',
    'forje-tweaks.jsx',
    'forje-app.jsx',
    'app-shell.jsx',
    'app-dashboard.jsx',
    'app-screens.jsx',
    'app-sources.jsx',
    'app-pulse.jsx',
    'app-onboarding.jsx',
    'app-main.jsx',
    'app-auth.jsx',
    'root.jsx',
  ];

  const V = '?v=7';
  for (const src of files) {
    try {
      const res  = await fetch(src + V);
      const jsx  = await res.text();
      const { code } = Babel.transform(jsx, { presets: ['react'] });
      const el = document.createElement('script');
      el.text = `(function(){\n${code}\n})();`;
      document.head.appendChild(el);
    } catch (e) {
      console.error(`[Forje] Erreur chargement ${src}:`, e);
    }
  }
})();
</script>
</body>
</html>
