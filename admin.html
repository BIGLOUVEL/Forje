<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Forje</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #08080C; --surface: #10101A; --surface-2: #17172A; --surface-3: #1F1F35;
    --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.13);
    --accent: #6366F1; --accent-dim: rgba(99,102,241,0.18);
    --text: #EAEAF4; --text-2: #9090A8; --text-3: #52526A;
    --success: #22C55E; --warning: #F59E0B; --danger: #EF4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }
  .pill { display: inline-flex; align-items: center; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .pill-purple { background: var(--accent-dim); color: #818CF8; }
  .pill-green  { background: rgba(34,197,94,.1); color: var(--success); }
  .pill-yellow { background: rgba(245,158,11,.1); color: var(--warning); }
  .pill-red    { background: rgba(239,68,68,.1); color: var(--danger); }

  .btn { border: 1px solid var(--border-hi); border-radius: 8px; padding: 7px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; background: var(--surface-2); color: var(--text-2); transition: .12s; }
  .btn:hover { background: var(--surface-3); color: var(--text); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .bar-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .bar-track { flex: 1; height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease; }

  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 360px; text-align: center; }
  input.code-input { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.12em; text-align: center; text-transform: uppercase; outline: none; margin: 20px 0 14px; transition: border-color .15s; }
  input.code-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .submit-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
  .submit-btn:hover { background: #4F52D8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const FEATURE_LABELS = {
  onboarding:         { label: 'Onboarding (analyse compte)', color: 'pill-purple' },
  onboarding_search:  { label: 'Onboarding · Web Search',    color: 'pill-purple' },
  scoring:            { label: 'Scoring (Agent 2)',           color: 'pill-yellow' },
  agent_chat:         { label: 'Agent Chat (Sonnet)',         color: 'pill-red'    },
  agent_chat_search:  { label: 'Agent Chat · Web Search',    color: 'pill-red'    },
  learning:           { label: 'Learning (Agent 3)',          color: 'pill-green'  },
  generate:           { label: 'Génération posts',           color: 'pill-yellow' },
  brand:              { label: 'Brand analyse',               color: 'pill-green'  },
};

const fmt = (n) => n == null ? '—' : `$${Number(n).toFixed(4)}`;
const fmtBig = (n) => n == null ? '—' : `$${Number(n).toFixed(2)}`;
const fmtNum = (n) => n == null ? '—' : Number(n).toLocaleString('fr-FR');

// ── Login ──────────────────────────────────────────────────────────────────────
const Login = ({ onAuth }) => {
  const [code, setCode] = useState('');
  const [err, setErr]   = useState('');

  const submit = async (e) => {
    e.preventDefault();
    try {
      const res = await fetch('/api/admin/costs?period=7d', { headers: { 'x-admin-code': code.trim() } });
      if (res.ok) { onAuth(code.trim()); }
      else { setErr('Code invalide.'); }
    } catch {
      setErr('Serveur inaccessible — lance node server.js dans le terminal.');
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div style={{ fontSize: 32, marginBottom: 12 }}>🔐</div>
        <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: '-0.03em' }}>Admin Forje</div>
        <div style={{ fontSize: 13, color: 'var(--text-3)', marginTop: 6 }}>Suivi des dépenses API</div>
        <form onSubmit={submit}>
          <input className="code-input" value={code} onChange={e => { setCode(e.target.value); setErr(''); }} placeholder="CODE ACCÈS" autoFocus/>
          {err && <div style={{ fontSize: 12, color: 'var(--danger)', marginBottom: 10 }}>{err}</div>}
          <button type="submit" className="submit-btn">Accéder →</button>
        </form>
      </div>
    </div>
  );
};

// ── Dashboard ──────────────────────────────────────────────────────────────────
const Dashboard = ({ adminCode }) => {
  const [period, setPeriod] = useState('30d');
  const [data, setData]     = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => { load(); }, [period]);

  const load = async () => {
    setLoading(true);
    const res = await fetch(`/api/admin/costs?period=${period}`, { headers: { 'x-admin-code': adminCode } });
    const d   = await res.json();
    setData(d);
    setLoading(false);
  };

  if (loading || !data) return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh' }}>
      <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)', animation: 'pulse 1.2s infinite' }}/>
    </div>
  );

  const features = Object.entries(data.by_feature || {}).sort((a, b) => b[1].cost - a[1].cost);
  const maxCost  = features.length ? features[0][1].cost : 1;

  const days = Object.entries(data.by_day || {}).sort((a, b) => a[0].localeCompare(b[0]));
  const maxDay = days.length ? Math.max(...days.map(d => d[1])) : 1;

  return (
    <div style={{ maxWidth: 900, margin: '0 auto', padding: '40px 24px' }}>

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 32, flexWrap: 'wrap', gap: 16 }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.04em' }}>Dépenses API</div>
          <div style={{ fontSize: 13, color: 'var(--text-3)', marginTop: 3 }}>Forje · Vue admin</div>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          {['7d','30d','all'].map(p => (
            <button key={p} className={`btn ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
              {p === '7d' ? '7 jours' : p === '30d' ? '30 jours' : 'Tout'}
            </button>
          ))}
        </div>
      </div>

      {/* Total cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 12, marginBottom: 24 }}>
        {[
          { label: 'Total dépensé', value: fmtBig(data.total_usd), sub: `${data.rows} appels` },
          { label: 'Coût moyen/appel', value: data.rows ? fmt(data.total_usd / data.rows) : '—', sub: 'par requête API' },
          { label: 'Features trackées', value: features.length, sub: 'types d\'appels' },
          { label: 'Jours trackés', value: days.length, sub: 'jours avec activité' },
        ].map((c, i) => (
          <div key={i} className="card" style={{ padding: '18px 20px' }}>
            <div className="label" style={{ marginBottom: 8 }}>{c.label}</div>
            <div className="mono" style={{ fontSize: 24, fontWeight: 700, color: 'var(--text)', letterSpacing: '-0.02em' }}>{c.value}</div>
            <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 4 }}>{c.sub}</div>
          </div>
        ))}
      </div>

      {/* Par feature */}
      <div className="card" style={{ marginBottom: 24 }}>
        <div className="label" style={{ marginBottom: 18 }}>Par feature</div>
        {features.length === 0 ? (
          <div style={{ textAlign: 'center', padding: 24, color: 'var(--text-3)', fontSize: 13 }}>
            Aucune dépense trackée pour cette période.<br/>
            Les appels futurs apparaîtront ici en temps réel.
          </div>
        ) : features.map(([key, val]) => {
          const meta = FEATURE_LABELS[key] || { label: key, color: 'pill-purple' };
          const pct  = maxCost > 0 ? (val.cost / maxCost) * 100 : 0;
          return (
            <div key={key} className="bar-row">
              <div style={{ width: 220, flexShrink: 0 }}>
                <span className={`pill ${meta.color}`}>{meta.label}</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{ width: `${pct}%` }}/>
              </div>
              <div className="mono" style={{ width: 70, textAlign: 'right', fontSize: 12, color: 'var(--text-2)', flexShrink: 0 }}>{fmt(val.cost)}</div>
              <div style={{ width: 60, textAlign: 'right', fontSize: 11, color: 'var(--text-3)', flexShrink: 0 }}>{fmtNum(val.calls)} appels</div>
              <div style={{ width: 80, textAlign: 'right', fontSize: 11, color: 'var(--text-3)', flexShrink: 0 }}>{fmtNum(val.input_tokens + val.output_tokens)} tok</div>
            </div>
          );
        })}
      </div>

      {/* Par jour */}
      {days.length > 0 && (
        <div className="card">
          <div className="label" style={{ marginBottom: 18 }}>Historique jour par jour</div>
          {days.map(([day, cost]) => {
            const pct = maxDay > 0 ? (cost / maxDay) * 100 : 0;
            return (
              <div key={day} className="bar-row">
                <div className="mono" style={{ width: 100, fontSize: 12, color: 'var(--text-3)', flexShrink: 0 }}>{day}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{ width: `${pct}%`, background: cost > 1 ? 'var(--warning)' : 'var(--accent)' }}/>
                </div>
                <div className="mono" style={{ width: 70, textAlign: 'right', fontSize: 12, color: 'var(--text-2)', flexShrink: 0 }}>{fmt(cost)}</div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ textAlign: 'center', marginTop: 32, fontSize: 11, color: 'var(--text-3)' }}>
        Forje Admin · Accès restreint · Les prix sont calculés localement selon les grilles tarifaires des fournisseurs
      </div>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────────
const App = () => {
  const [adminCode, setAdminCode] = useState(null);
  if (!adminCode) return <Login onAuth={setAdminCode}/>;
  return <Dashboard adminCode={adminCode}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
